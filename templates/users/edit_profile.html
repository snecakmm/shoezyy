{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Profile - Sheozy{% endblock %}

{% block content %}
<section class="edit-profile-section">
    <div class="container">
        <h1 class="section-title">Edit Profile</h1>

        <form method="post" enctype="multipart/form-data" class="edit-profile-form">
            {% csrf_token %}
            
            <div class="form-section">
                <h2>Personal Information</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" class="form-control">
                    </div>
                </div>

                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" rows="4" class="form-control">{{ user.bio }}</textarea>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" value="{{ user.phone }}" class="form-control">
                </div>
            </div>

            <div class="form-section">
                <h2>Address Information</h2>
                
                <div class="form-group">
                    <label for="address">Street Address</label>
                    <input type="text" id="address" name="address" value="{{ user.address }}" class="form-control">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" value="{{ user.city }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="state">State/Province</label>
                        <input type="text" id="state" name="state" value="{{ user.state }}" class="form-control">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="postal_code">Postal Code</label>
                        <input type="text" id="postal_code" name="postal_code" value="{{ user.postal_code }}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" name="country" value="{{ user.country }}" class="form-control">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2>Profile Picture</h2>
                
                {% if user.avatar %}
                    <div class="avatar-preview">
                        <img src="{{ user.avatar.url }}" alt="Avatar">
                    </div>
                {% endif %}
                
                <div class="form-group">
                    <label for="avatar">Upload New Avatar</label>
                    <input type="file" id="avatar" name="avatar" accept="image/*" class="form-control">
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                <a href="{% url 'users:profile' %}" class="btn btn-secondary btn-lg">Cancel</a>
            </div>
        </form>
    </div>
</section>

<style>
.edit-profile-section {
    padding: 60px 20px;
}

.edit-profile-form {
    max-width: 600px;
    margin: 0 auto;
}

.form-section {
    background: white;
    border-radius: 12px;
    box-shadow: var(--shadow-md);
    padding: 24px;
    margin-bottom: 24px;
}

.form-section h2 {
    font-size: 20px;
    margin-bottom: 20px;
    color: var(--gray-900);
}

.avatar-preview {
    margin-bottom: 20px;
}

.avatar-preview img {
    width: 150px;
    height: 150px;
    border-radius: 12px;
    object-fit: cover;
}

.form-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
}

@media (max-width: 768px) {
    .form-row {
        grid-template-columns: 1fr;
    }
    
    .form-actions {
        flex-direction: column;
    }
}
</style>
{% endblock %}
